<title>cc-gui — 知识图谱</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#0f1923; --panel-bg:#182635; --text:#b8c7d9; --text-light:#8ba0b8;
  --accent:#3b82f6; --border:#243447; --hover:#1d3347;
  --red:#e74c3c; --blue:#3498db; --green:#2ecc71; --orange:#e67e22;
  --purple:#9b59b6; --gray:#95a5a6; --yellow:#f1c40f;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background:var(--bg); color:var(--text); overflow:hidden; height:100vh; display:flex;
}
.sidebar {
  width:320px; min-width:320px; background:var(--panel-bg); border-right:1px solid var(--border);
  display:flex; flex-direction:column; z-index:10;
}
.sidebar-header {
  padding:20px; border-bottom:1px solid var(--border);
}
.sidebar-header h1 { font-size:18px; font-weight:600; color:#e2e8f0; margin-bottom:4px; }
.sidebar-header .subtitle { font-size:12px; color:var(--text-light); }
.search-box {
  margin:12px 20px;
}
.search-box input {
  width:100%; padding:8px 12px; background:var(--bg); border:1px solid var(--border);
  border-radius:6px; color:var(--text); font-size:13px; outline:none;
}
.search-box input:focus { border-color:var(--accent); }
.legend {
  padding:8px 20px; border-bottom:1px solid var(--border);
}
.legend-title { font-size:11px; text-transform:uppercase; color:var(--text-light); margin-bottom:6px; letter-spacing:.5px; }
.legend-items { display:flex; flex-wrap:wrap; gap:6px; }
.legend-item { display:flex; align-items:center; gap:4px; font-size:11px; cursor:pointer; opacity:.7; transition:opacity .15s; }
.legend-item:hover { opacity:1; }
.legend-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.stats {
  padding:8px 20px; display:flex; gap:16px; font-size:11px; color:var(--text-light); border-bottom:1px solid var(--border);
}
.stats span strong { color:var(--text); }
.node-detail {
  flex:1; overflow-y:auto; padding:16px 20px;
}
.node-detail .empty { color:var(--text-light); font-size:13px; text-align:center; margin-top:40px; }
.node-detail h3 { font-size:16px; color:#e2e8f0; margin-bottom:4px; }
.node-detail .type-tag {
  display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; margin-bottom:8px;
}
.node-detail .desc { font-size:13px; line-height:1.5; color:var(--text-light); margin-bottom:12px; }
.node-detail .methods { margin-top:8px; }
.node-detail .methods h4 { font-size:11px; text-transform:uppercase; color:var(--text-light); margin-bottom:4px; letter-spacing:.5px; }
.node-detail .methods .tag {
  display:inline-block; padding:2px 6px; border-radius:3px; background:var(--bg);
  font-size:12px; margin:2px 3px 2px 0; font-family:monospace;
}
.node-detail .relations { margin-top:12px; }
.node-detail .relations h4 { font-size:11px; text-transform:uppercase; color:var(--text-light); margin-bottom:4px; letter-spacing:.5px; }
.node-detail .relations .rel {
  display:block; padding:3px 0; font-size:12px; color:var(--text); text-decoration:none;
  border-bottom:1px solid var(--border); cursor:pointer;
}
.node-detail .relations .rel:hover { color:var(--accent); }
.graph-container { flex:1; position:relative; }
.graph-container svg { width:100%; height:100%; }
.tooltip {
  position:absolute; pointer-events:none; background:rgba(15,25,35,.95);
  border:1px solid var(--border); border-radius:6px; padding:8px 12px; font-size:12px;
  opacity:0; transition:opacity .15s; max-width:240px; z-index:100;
}
.tooltip .tt-name { font-weight:600; color:#e2e8f0; }
.tooltip .tt-type { font-size:10px; color:var(--text-light); }
.tooltip .tt-desc { font-size:11px; color:var(--text-light); margin-top:4px; }

/* 小地图 */
.minimap {
  position:absolute; bottom:12px; right:12px; width:180px; height:130px;
  background:rgba(15,25,35,.85); border:1px solid var(--border); border-radius:6px;
  overflow:hidden; z-index:50; cursor:pointer;
}
.minimap svg { width:100%; height:100%; }
.minimap .viewport-rect {
  fill:rgba(59,130,246,.15); stroke:var(--accent); stroke-width:1;
}

/* 响应式：小屏幕时侧栏缩窄 */
@media (max-width:768px) {
  .sidebar { width:260px; min-width:260px; }
}
</style>

    { "source": "Rust 后端:lib", "target": "Rust 后端", "relation": "所属模块" },
    { "source": "Rust 后端:process", "target": "Rust 后端", "relation": "所属模块" },
    { "source": "Rust 后端:protocol", "target": "Rust 后端", "relation": "所属模块" },
    { "source": "Rust 后端:session", "target": "Rust 后端", "relation": "所属模块" },
    { "source": "Rust 后端:db", "target": "Rust 后端", "relation": "所属模块" }
  ]
}
;

// === 颜色映射 ===
const GROUP_COLORS = {
  "模块":       "#e74c3c",
  "自动配置":   "#3498db",
  "核心API":    "#2ecc71",
  "工具类":     "#95a5a6",
  "注解":       "#e67e22",
  "配置":       "#9b59b6",
  "异常":       "#f39c12"
};

// === 安全工具：HTML 转义，防止 XSS（数据来自源码 Javadoc，可能含 HTML 标签）===
function esc(s) {
  if (s == null) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

// === 初始化 ===
const container = document.getElementById("graph");
const width = container.clientWidth;
const height = container.clientHeight;

const svg = d3.select("#graph").append("svg")
  .attr("width", width).attr("height", height);

const g = svg.append("g");
const zoom = d3.zoom().scaleExtent([0.15, 4]).on("zoom", (e) => {
  g.attr("transform", e.transform);
  updateMinimapViewport();
});
svg.call(zoom);

// === 图例 ===
const legendEl = document.getElementById("legend");
const groups = [...new Set(DATA.nodes.map(n => n.group))].filter(Boolean);
document.getElementById("statNodes").textContent = DATA.nodes.length;
document.getElementById("statEdges").textContent = DATA.edges.length;

groups.forEach(g => {
  const item = document.createElement("span");
  item.className = "legend-item";
  item.innerHTML = `<span class="legend-dot" style="background:${GROUP_COLORS[g]||"#666"}"></span>${esc(g)}`;
  item.onclick = () => highlightGroup(g);
  legendEl.appendChild(item);
});

// === 力导向模拟 ===
const nodeMap = new Map(DATA.nodes.map(n => [n.id, n]));
const links = DATA.edges.map(e => ({ source: e.source, target: e.target, relation: e.relation }));

const simulation = d3.forceSimulation(DATA.nodes)
  .force("link", d3.forceLink(links).id(d => d.id).distance(120))
  .force("charge", d3.forceManyBody().strength(-300))
  .force("center", d3.forceCenter(width/2, height/2))
  .force("collision", d3.forceCollide().radius(d => nodeRadius(d)))

// === 渲染 ===
const linkEl = g.append("g").selectAll("line")
  .data(links).join("line")
  .attr("stroke", "#2a3f54").attr("stroke-width", d => d.relation === "模块依赖" ? 2 : 0.8)
  .attr("stroke-opacity", 0.6);

const nodeEl = g.append("g").selectAll("circle")
  .data(DATA.nodes).join("circle")
  .attr("r", d => nodeRadius(d))
  .attr("fill", d => GROUP_COLORS[d.group] || "#666")
  .attr("stroke", "#1a2d3f").attr("stroke-width", 1.5)
  .attr("cursor", "pointer")
  .call(drag(simulation));

const labelEl = g.append("g").selectAll("text")
  .data(DATA.nodes).join("text")
  .text(d => d.label.length > 18 ? d.label.slice(0,17) + "…" : d.label)
  .attr("font-size", d => labelSize(d)).attr("fill", "#8ba0b8")
  .attr("dx", d => nodeRadius(d) + 6).attr("dy", 4)
  .attr("pointer-events", "none");

// === 交互 ===
const tooltip = document.getElementById("tooltip");

nodeEl.on("mouseover", (event, d) => {
  tooltip.style.opacity = "1";
  // XSS 防护：所有来自数据的字符串均通过 esc() 转义后插入 innerHTML
  tooltip.innerHTML = `<div class="tt-name">${esc(d.label)}</div>
    <div class="tt-type">${esc(d.type)} · ${esc(d.group||"")}</div>
    ${d.description ? `<div class="tt-desc">${esc(d.description)}</div>` : ""}`;
  // 高亮相邻节点
  const neighbors = new Set();
  links.forEach(l => {
    if (l.source.id === d.id) neighbors.add(l.target.id);
    if (l.target.id === d.id) neighbors.add(l.source.id);
  });
  nodeEl.attr("opacity", n => n.id === d.id || neighbors.has(n.id) ? 1 : 0.15);
  linkEl.attr("stroke-opacity", l => l.source.id === d.id || l.target.id === d.id ? 0.9 : 0.05);
}).on("mousemove", (event) => {
  tooltip.style.left = (event.offsetX + 12) + "px";
  tooltip.style.top = (event.offsetY - 10) + "px";
}).on("mouseout", () => {
  tooltip.style.opacity = "0";
  nodeEl.attr("opacity", 1);
  linkEl.attr("stroke-opacity", 0.6);
});

nodeEl.on("click", (event, d) => showDetail(d));

// === 详情面板 ===
function showDetail(d) {
  const detail = document.getElementById("detail");
  const neighbors = [];
  links.forEach(l => {
    if (l.source.id === d.id) neighbors.push({ dir:"→", node:nodeMap.get(l.target.id), rel:l.relation });
    if (l.target.id === d.id) neighbors.push({ dir:"←", node:nodeMap.get(l.source.id), rel:l.relation });
  });
  const unique = [...new Map(neighbors.map(n => [n.node.id, n])).values()];

  // XSS 防护：所有来自数据的字符串均通过 esc() 转义后插入 innerHTML
  detail.innerHTML = `
    <h3>${esc(d.label)}</h3>
    <span class="type-tag" style="background:${GROUP_COLORS[d.group]||"#666"};color:#fff">${esc(d.type)} · ${esc(d.group||"")}</span>
    ${d.module ? `<div style="font-size:12px;color:var(--text-light);margin-bottom:4px">模块：${esc(d.module)}</div>` : ""}
    ${d.description ? `<div class="desc">${esc(d.description)}</div>` : ""}
    ${d.methods && d.methods.length ? `
      <div class="methods"><h4>核心方法</h4>
        ${d.methods.map(m => `<span class="tag">${esc(m)}</span>`).join("")}
      </div>` : ""}
    ${unique.length ? `
      <div class="relations"><h4>关联节点（${unique.length}）</h4>
        ${unique.slice(0,15).map(n => `<span class="rel" onclick="focusNode('${esc(n.node.id)}')">${n.dir} ${esc(n.node.label)} <span style="color:var(--text-light);font-size:11px">${esc(n.rel)}</span></span>`).join("")}
        ${unique.length > 15 ? `<div style="font-size:11px;color:var(--text-light)">...及其他 ${unique.length-15} 个</div>` : ""}
      </div>` : ""}
  `;
}

// === 搜索 ===
document.getElementById("search").addEventListener("input", (e) => {
  const q = e.target.value.toLowerCase();
  if (!q) { nodeEl.attr("opacity",1); linkEl.attr("stroke-opacity",0.6); labelEl.attr("opacity",1); return; }
  const matched = new Set();
  DATA.nodes.forEach(n => {
    if (n.label.toLowerCase().includes(q) || n.id.toLowerCase().includes(q)
        || (n.module||"").toLowerCase().includes(q) || (n.description||"").toLowerCase().includes(q)) {
      matched.add(n.id);
    }
  });
  nodeEl.attr("opacity", n => matched.has(n.id) ? 1 : 0.08);
  linkEl.attr("stroke-opacity", l => matched.has(l.source.id) && matched.has(l.target.id) ? 0.9 : 0.02);
  labelEl.attr("opacity", n => matched.has(n.id) ? 1 : 0);
});

// === 图例交互 ===
function highlightGroup(group) {
  nodeEl.attr("opacity", n => n.group === group ? 1 : 0.1);
  linkEl.attr("stroke-opacity", 0.05);
  labelEl.attr("opacity", n => n.group === group ? 1 : 0);
}

// === 聚焦节点 ===
window.focusNode = function(id) {
  const node = DATA.nodes.find(n => n.id === id);
  if (!node) return;
  // 恢复所有节点
  nodeEl.attr("opacity", 1);
  linkEl.attr("stroke-opacity", 0.6);
  labelEl.attr("opacity", 1);
  // 居中并放大
  const transform = d3.zoomIdentity.translate(width/2 - node.x, height/2 - node.y).scale(2);
  svg.transition().duration(500).call(d3.zoom().transform, transform);
  showDetail(node);
};

// === 辅助函数 ===
function nodeRadius(d) {
  const degree = links.filter(l => l.source.id === d.id || l.target.id === d.id).length;
  return d.type === "模块" ? 8 + degree * 2 : 5 + Math.min(degree, 10);
}
function labelSize(d) { return d.type === "模块" ? "10px" : "8px"; }

function drag(sim) {
  let d0;
  return d3.drag()
    .on("start", (event,d) => { if(!event.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
    .on("drag", (event,d) => { d.fx=event.x; d.fy=event.y; })
    .on("end", (event,d) => { if(!event.active) sim.alphaTarget(0); d.fx=null; d.fy=null; });
}

// === 模拟更新 ===
simulation.on("tick", () => {
  linkEl.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y)
         .attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
  nodeEl.attr("cx",d=>d.x).attr("cy",d=>d.y);
  labelEl.attr("x",d=>d.x).attr("y",d=>d.y);
});

// === 窗口适配 ===
window.addEventListener("resize", () => {
  const w = container.clientWidth, h = container.clientHeight;
  svg.attr("width",w).attr("height",h);
  simulation.force("center", d3.forceCenter(w/2, h/2)).restart();
});

// === 小地图 ===
const minimapSvg = d3.select("#minimap svg");
const mmW = 180, mmH = 130, mmPad = 8;
let mmScale = 1, mmTx = 0, mmTy = 0;

simulation.on("end", () => {
  const xs = DATA.nodes.map(n => n.x), ys = DATA.nodes.map(n => n.y);
  const xMin = Math.min(...xs), xMax = Math.max(...xs);
  const yMin = Math.min(...ys), yMax = Math.max(...ys);
  const dataW = xMax - xMin || 1, dataH = yMax - yMin || 1;
  mmScale = Math.min((mmW - mmPad*2) / dataW, (mmH - mmPad*2) / dataH);
  mmTx = mmPad - xMin * mmScale;
  mmTy = mmPad - yMin * mmScale;

  // 节点小圆点
  minimapSvg.selectAll("circle").data(DATA.nodes).join("circle")
    .attr("cx", d => d.x * mmScale + mmTx).attr("cy", d => d.y * mmScale + mmTy)
    .attr("r", 1.5).attr("fill", d => GROUP_COLORS[d.group] || "#666")
    .attr("opacity", 0.7);

  // 视口框
  minimapSvg.append("rect").attr("class", "viewport-rect");
  updateMinimapViewport();
});

function updateMinimapViewport() {
  const t = d3.zoomTransform(svg.node());
  const vpX = (-t.x) / t.k, vpY = (-t.y) / t.k;
  const vpW = width / t.k, vpH = height / t.k;
  minimapSvg.select(".viewport-rect")
    .attr("x", vpX * mmScale + mmTx).attr("y", vpY * mmScale + mmTy)
    .attr("width", vpW * mmScale).attr("height", vpH * mmScale);
}

// 小地图：点击跳转 + 拖拽平移主视图
const minimapEl = document.getElementById("minimap");
let mmDragging = false, mmStartT;

function minimapPan(e) {
  const rect = minimapEl.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  svg.call(zoom.transform,
    d3.zoomIdentity.translate(-(mx - mmTx) / mmScale * mmStartT.k + width/2,
                               -(my - mmTy) / mmScale * mmStartT.k + height/2).scale(mmStartT.k));
}

minimapEl.addEventListener("mousedown", (e) => {
  mmDragging = true;
  mmStartT = d3.zoomTransform(svg.node());
  minimapEl.style.cursor = "grabbing";
  minimapPan(e);
  e.preventDefault();
});

window.addEventListener("mousemove", (e) => {
  if (!mmDragging) return;
  minimapPan(e);
});

window.addEventListener("mouseup", () => {
  if (!mmDragging) return;
  mmDragging = false;
  minimapEl.style.cursor = "";
});
</script>
</body>
</html>
